<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式</title>
    <style>
        * {
            margin:0; padding:0; box-sizing:border-box;
            font-family:Arial, sans-serif;
        }
        body {
            background:#f1f1f1; color:#222;
            height:100vh; overflow:hidden;
        }

        /* ======================
           PC 端 原 样 不 动
        ====================== */
        .page-top-title {
            position:absolute; top:24px; left:26px;
            font-size:30px; font-weight:900; line-height:1.1;
        }
        .right-nav {
            position:fixed; right:36px; top:50%; transform:translateY(-50%);
            display:flex; flex-direction:column; gap:16px; z-index:999;
        }
        .hamburger {
            display:flex; flex-direction:column; gap:6px; margin-bottom:4px;
        }
        .hamburger span {
            width:30px; height:3px; background:#222;
        }
        .right-nav a {
            text-decoration:none; color:#222; font-size:15px; padding:7px 14px;
        }
        .right-nav a.active {
            background:#222; color:#fff;
        }
        .contact-container {
            width:100%; height:100vh;
            display:flex; align-items:center; justify-content:center;
        }
        .contact-box {
            position:relative; padding:45px 70px;
        }
        .contact-box .left-border,
        .contact-box .right-border {
            position:absolute; top:0; width:2px; height:100%; background:#222;
        }
        .left-border{left:0;} .right-border{right:0;}
        
        .contact-box::before,
        .contact-box::after,
        .bottom-left-line,
        .bottom-right-line {
            position:absolute; width:50px; height:2px; background:#222;
        }
        .contact-box::before{top:0; left:0;}
        .contact-box::after{top:0; right:0;}
        .bottom-left-line{bottom:0; left:0;}
        .bottom-right-line{bottom:0; right:0;}

        .addr-cn {
            text-align:center; font-size:18px;
        }
        .addr-en {
            text-align:center; font-size:10px; opacity:0.6; margin-top:4px;
        }
        .contact-title {
            font-size:66px; font-weight:900; text-align:center; line-height:1.2; margin:26px 0;
        }
        .contact-text {
            text-align:center; font-size:19px; line-height:1.8;
        }

        /* ======================
           手 机 端 样 式
        ====================== */
        @media (max-width:900px) {
            body {
                height:auto; overflow-x:hidden; overflow-y:auto;
            }
            .right-nav {
                display:none; /* 手机隐藏PC导航 */
            }
            .page-top-title {
                font-size:24px; top:16px; left:16px;
            }
            .contact-container {
                min-height:100vh; padding:4rem 5vw 6rem;
                align-items:flex-start; justify-content:center;
            }
            .contact-box {
                width:100%; max-width:760px; padding:36px 28px;
            }
            .contact-title { font-size:40px; }
            .contact-text { font-size:16px; }

            /* ========== 手机底部统一导航按钮 ========== */
            .mobile-footer-nav {
                position:fixed; bottom:0; left:0; width:100%;
                background:#fff; display:flex; border-top:1px solid #ddd;
                z-index:999;
            }
            .mobile-footer-nav a {
                flex:1; text-align:center; padding:16px 0;
                font-size:14px; color:#222; text-decoration:none;
            }
            .mobile-footer-nav a.active {
                background:#222; color:#fff;
            }
        }

        /* PC端隐藏手机按钮 */
        @media (min-width:901px) {
            .mobile-footer-nav { display:none !important; }
        }
    </style>
</head>

<body>

<!-- 左上角标题 -->
<div class="page-top-title">
    PERSONAL<br>WEBSITE
</div>

<!-- PC端右侧导航 -->
<div class="right-nav">
    <div class="hamburger"><span></span><span></span><span></span></div>
    <a href="index.html">首页</a>
    <a href="index.html">个人介绍</a>
    <a href="作品展示.html">作品展示</a>
    <a href="联系方式.html" class="active">联系方式</a>
</div>

<!-- 联系方式内容 -->
<div class="contact-container">
    <div class="contact-box">
        <div class="left-border"></div>
        <div class="right-border"></div>
        <div class="bottom-left-line"></div>
        <div class="bottom-right-line"></div>

        <div class="addr-cn">某省某市某区某地</div>
        <div class="addr-en">NORTH OF GUANGZHOU AVENUE, TIANHE DISTRICT, GUANGZHOU, GUANGDONG</div>

        <div class="contact-title">
            CONTACT<br>INFORMATION
        </div>

        <div class="contact-text">
            QQ: 2457104825 &nbsp; TEL: 15677722303<br>
            E-MAIL: 2457104825@qq.com
        </div>
    </div>
</div>

<!-- ========== 手机底部 3 个统一按钮 ========== -->
<div class="mobile-footer-nav">
    <a href="index.html">首页</a>
    <a href="作品展示.html">作品</a>
    <a href="联系方式.html" class="active">联系</a>
</div>

</body>
</html>
